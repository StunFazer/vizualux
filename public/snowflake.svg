<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .snowflake-branch { stroke: #00f3ff; stroke-width: 3.5; stroke-linecap: round; fill: none; }
  </style>
  <g transform="translate(50,50)">
    <g id="branch">
      <line x1="0" y1="0" x2="0" y2="-40" class="snowflake-branch" />
      <path d="M -8,-25 L 0,-30 L 8,-25" class="snowflake-branch" />
      <path d="M -12,-12 L 0,-18 L 12,-12" class="snowflake-branch" />
    </g>
    <g transform="rotate(60)"><use href="#branch"/></g>
    <g transform="rotate(120)"><use href="#branch"/></g>
    <g transform="rotate(180)"><use href="#branch"/></g>
    <g transform="rotate(240)"><use href="#branch"/></g>
    <g transform="rotate(300)"><use href="#branch"/></g>
  </g>
</svg>
